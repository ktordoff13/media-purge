<mat-sidenav-container class="shell">
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="brand">
      <mat-icon class="brand-icon">movie_filter</mat-icon>
      <div>
        <div class="brand-name">Media Review</div>
        <div class="brand-tag">reclaim your storage</div>
      </div>
    </div>
    <mat-nav-list>
      @for (item of nav; track item.path) {
        <a mat-list-item [routerLink]="item.path" routerLinkActive="active-link">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
    <div class="spacer"></div>
    <a class="api-docs-link" href="/api/docs" target="_blank" rel="noopener">
      <mat-icon>api</mat-icon> API docs
    </a>
  </mat-sidenav>
  <mat-sidenav-content>
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
