<mat-sidenav-container class="shell">
  <mat-sidenav
    class="sidenav"
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="isMobile() ? navOpen() : true"
    (openedChange)="navOpen.set($event)"
  >
    <div class="brand">
      <mat-icon class="brand-icon">movie_filter</mat-icon>
      <div>
        <div class="brand-name">Media Purge</div>
        <div class="brand-tag">reclaim your storage</div>
      </div>
    </div>
    <mat-nav-list>
      @for (item of nav; track item.path) {
        <a mat-list-item [routerLink]="item.path" routerLinkActive="active-link" (click)="closeNavOnMobile()">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
    <div class="spacer"></div>
    <div class="sidenav-footer">
      <a class="api-docs-link" href="/api/docs" target="_blank" rel="noopener">
        <mat-icon>api</mat-icon> API docs
      </a>
      <button
        class="theme-toggle"
        (click)="theme.cycle()"
        [matTooltip]="themeLabels[theme.mode()] + ' — click to change'"
        [attr.aria-label]="themeLabels[theme.mode()]"
      >
        <mat-icon>{{ themeIcons[theme.mode()] }}</mat-icon>
      </button>
    </div>
    @if (version()) {
      <div class="version" matTooltip="Image tag · build commit of what's running">{{ version() }}</div>
    }
  </mat-sidenav>
  <mat-sidenav-content>
    @if (isMobile()) {
      <div class="mobile-bar">
        <button class="menu-btn" (click)="navOpen.set(true)" aria-label="Open navigation">
          <mat-icon>menu</mat-icon>
        </button>
        <mat-icon class="mobile-brand-icon">movie_filter</mat-icon>
        <span class="mobile-brand-name">Media Purge</span>
      </div>
    }
    @if (dryRunState.dryRun() === false) {
      <a
        class="live-banner"
        routerLink="/settings"
        matTooltip="Dry-run is off. Approvals move real files to the recycle bin (restorable until the retention window lapses). Click to change in Settings."
      >
        <mat-icon inline>warning</mat-icon>
        LIVE MODE — deletions are real
      </a>
    }
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
