<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="8" y="8" width="496" height="496" rx="104" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="104" fill="url(#sheen)"/>

  <!-- handle -->
  <rect x="216" y="106" width="80" height="40" rx="18" fill="none" stroke="#ffffff" stroke-width="22"/>

  <!-- lid -->
  <rect x="128" y="136" width="256" height="34" rx="17" fill="#ffffff"/>

  <!-- can body: gentle taper, rounded bottom corners -->
  <path fill="#ffffff" d="
    M 152 198
    L 178 396
    Q 181 420 205 420
    L 307 420
    Q 331 420 334 396
    L 360 198
    Z"/>

  <!-- play triangle punched out of the body -->
  <path fill="#5b21b6" d="
    M 226 252
    L 226 356
    Q 226 368 237 362
    L 314 314
    Q 324 308 314 300
    L 237 246
    Q 226 240 226 252
    Z"/>
</svg>
